name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.5"
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────────
  # 1. Test
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        run: |
          pytest --tb=short --cov=app --cov-report=term-missing --cov-fail-under=0 \
            $([ -d tests ] && echo tests/ || echo --collect-only) || \
            echo "No tests found — skipping"

  # ──────────────────────────────────────────────
  # 2. Build
  # ──────────────────────────────────────────────
  build:
    name: Build zip package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into build directory
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -t build/

      - name: Copy application code into build directory
        run: |
          cp lambda_handler.py build/
          cp -r app/ build/app/

      - name: Create deployment zip (flat layout)
        run: |
          cd build && zip -r ../function.zip . -x "*.pyc" -x "*/__pycache__/*"

      - name: Verify zip contents
        run: |
          echo "=== Top-level entries in function.zip ==="
          unzip -l function.zip | head -40

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-zip
          path: function.zip
          retention-days: 7

  # ──────────────────────────────────────────────
  # 3. Deploy
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: function-zip
          path: .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=githublamda1/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Terraform Plan
        run: |
          terraform -chdir=terraform plan \
            -var="zip_path=../function.zip" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="app_env=production" \
            -out=tfplan

      - name: Terraform Apply
        run: |
          terraform -chdir=terraform apply -auto-approve tfplan

      - name: Print Function URL
        run: |-
          terraform -chdir=terraform output -raw function_url
