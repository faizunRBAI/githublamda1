name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC / aws-actions/configure-aws-credentials
  contents: read

env:
  AWS_REGION: us-east-1
  FUNCTION_NAME: githublamda1
  PYTHON_VERSION: "3.11"
  TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
  TF_BACKEND_KEY: githublamda1/terraform.tfstate
  TF_BACKEND_REGION: us-east-1

jobs:
  # --------------------------------------------------------------------------
  # 1. TEST
  # --------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install fastapi mangum uvicorn httpx pytest pytest-cov anyio

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=0 || true
          # Replace --cov-fail-under=0 with an appropriate threshold
          # once a test suite is established; never lower the threshold.

  # --------------------------------------------------------------------------
  # 2. BUILD
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install production dependencies into build directory
        run: |
          mkdir -p build
          pip install \
            --target build \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.11 \
            --only-binary=:all: \
            --upgrade \
            fastapi mangum uvicorn

      - name: Copy application source into build directory
        run: |
          # Application packages
          cp -r app build/app

          # Lambda handler — must be at the zip root
          cp lambda_handler.py build/lambda_handler.py

          # Optional: bundle public/ static directory if present
          if [ -d public ]; then
            cp -r public build/public
          fi

      - name: Create deployment zip (contents at zip root, not nested)
        run: |
          cd build
          zip -r ../deployment.zip . -x "*.pyc" -x "*/__pycache__/*" -x "*.dist-info/*"
          cd ..

      - name: Verify lambda_handler.py is at zip root
        run: |
          unzip -l deployment.zip | grep -E "^\s+[0-9].*lambda_handler\.py$" | head -5
          # Fail if lambda_handler.py is not present at the root
          unzip -l deployment.zip | grep -qE "\slambda_handler\.py$"

      - name: Upload deployment zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-zip
          path: deployment.zip
          retention-days: 7

  # --------------------------------------------------------------------------
  # 3. DEPLOY
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download deployment zip artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-zip
          path: .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="zip_path=../deployment.zip" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="function_name=${{ env.FUNCTION_NAME }}" \
            -var="app_env=${{ vars.APP_ENV || 'development' }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Print Function URL
        working-directory: terraform
        run: |-
          terraform output -raw function_url || true