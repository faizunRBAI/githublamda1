name: Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm teardown of all infrastructure"
        required: true
        default: ""

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FUNCTION_NAME: githublamda1
  TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
  TF_BACKEND_KEY: githublamda1/terraform.tfstate
  TF_BACKEND_REGION: us-east-1

jobs:
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest

    # Hard gate — the workflow does nothing unless the user typed DESTROY
    if: ${{ github.event.inputs.confirm == 'DESTROY' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # We need a dummy zip so Terraform can parse the resource without
      # error before destroying it (filebase64sha256 is evaluated at plan
      # time even during destroy).
      - name: Create placeholder zip for Terraform plan
        run: |
          echo "placeholder" > /tmp/placeholder.txt
          zip deployment.zip /tmp/placeholder.txt

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}"

      - name: Terraform Destroy
        working-directory: terraform
        run: |-
          terraform destroy \
            -auto-approve \
            -var="zip_path=../deployment.zip" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="function_name=${{ env.FUNCTION_NAME }}"
