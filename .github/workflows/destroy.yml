name: Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'destroy' to confirm teardown of all resources"
        required: true
        default: ""

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.5"

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Abort if not confirmed
        if: ${{ github.event.inputs.confirm != 'destroy' }}
        run: |
          echo "Destroy not confirmed. Input must be exactly 'destroy'. Exiting."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create a placeholder zip so Terraform can read filebase64sha256
        run: |
          echo "placeholder" > /tmp/placeholder.zip

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=githublamda1/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Destroy
        run: |-
          terraform -chdir=terraform destroy -auto-approve \
            -var="zip_path=/tmp/placeholder.zip" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="app_env=production"
